<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equilibrium Lab | Dashboard Energia</title>
  <meta name="description" content="Traccia quotidianamente energia, focus e chiusure. Visualizza i trend nel tempo.">
  <link rel="stylesheet" href="assets/css/palette.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div data-include="header"></div>

  <main class="container" style="max-width: 800px; padding: 3rem 0;">
    <h1>Dashboard dell'Energia</h1>
    <p class="hero-sub">Registra ogni giorno i tuoi livelli e scopri i tuoi pattern cognitivi.</p>

    <div style="background: var(--white); padding: 2rem; border-radius: 16px; margin: 2rem 0;">
      <div style="margin-bottom:1.5rem;">
        <label>Energia (1-10) <span id="energy-val">5</span></label>
        <input type="range" id="energy" min="1" max="10" value="5" oninput="document.getElementById('energy-val').innerText=this.value">
      </div>
      <div style="margin-bottom:1.5rem;">
        <label>Focus (1-10) <span id="focus-val">5</span></label>
        <input type="range" id="focus" min="1" max="10" value="5" oninput="document.getElementById('focus-val').innerText=this.value">
      </div>
      <div style="margin-bottom:1.5rem;">
        <label>Chiusure (0-10) <span id="closures-val">0</span></label>
        <input type="range" id="closures" min="0" max="10" value="0" oninput="document.getElementById('closures-val').innerText=this.value">
      </div>
      <button id="save-btn" style="background:var(--accent); color:var(--primary); border:none; padding:1rem 2rem; border-radius:40px; font-weight:600; cursor:pointer;">Salva giornata</button>
    </div>

    <div style="height:300px; margin:2rem 0;">
      <canvas id="chart"></canvas>
    </div>

    <div id="last-entries" style="background:var(--light-gray); padding:1.5rem; border-radius:12px;"></div>
  </main>

  <div data-include="footer"></div>
  <script src="assets/js/includes.js" defer></script>
  <script>
    const STORAGE_KEY = 'energy_dashboard';
    let chart;

    function getEntries() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveEntry(energy, focus, closures) {
      const entries = getEntries();
      const today = new Date().toISOString().slice(0,10);
      const idx = entries.findIndex(e => e.date === today);
      const newEntry = { date: today, energy, focus, closures };
      if (idx >= 0) entries[idx] = newEntry;
      else entries.push(newEntry);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries.slice(-30)));
      return entries;
    }

    function updateUI(entries) {
      // Lista ultimi 7 giorni
      const list = document.getElementById('last-entries');
      const last7 = entries.slice(-7).reverse();
      list.innerHTML = '<h3>Ultimi 7 giorni</h3>';
      if (last7.length === 0) list.innerHTML += '<p>Nessun dato ancora.</p>';
      else {
        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        last7.forEach(e => {
          const li = document.createElement('li');
          li.style.padding = '0.5rem 0';
          li.innerHTML = `<strong>${e.date}</strong> – Energia ${e.energy}, Focus ${e.focus}, Chiusure ${e.closures}`;
          ul.appendChild(li);
        });
        list.appendChild(ul);
      }

      // Grafico
      if (entries.length === 0) return;
      const labels = entries.map(e => e.date.slice(5));
      const energyData = entries.map(e => e.energy);
      const focusData = entries.map(e => e.focus);
      const closuresData = entries.map(e => e.closures);

      if (chart) chart.destroy();
      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Energia', data: energyData, borderColor: '#0A2A44', tension: 0.2 },
            { label: 'Focus', data: focusData, borderColor: '#C6A43F', tension: 0.2 },
            { label: 'Chiusure', data: closuresData, borderColor: '#2E2E2E', tension: 0.2 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 10 } } }
      });
    }

    document.getElementById('save-btn').addEventListener('click', () => {
      const energy = parseInt(document.getElementById('energy').value);
      const focus = parseInt(document.getElementById('focus').value);
      const closures = parseInt(document.getElementById('closures').value);
      const entries = saveEntry(energy, focus, closures);
      updateUI(entries);
      alert('Dati salvati!');
    });

    document.addEventListener('DOMContentLoaded', () => {
      updateUI(getEntries());
    });
  </script>
</body>
</html>
