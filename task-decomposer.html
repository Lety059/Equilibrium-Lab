<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equilibrium Lab | Task Decomposer</title>
  <meta name="description" content="Scomponi un compito complesso in micro-passi concreti per superare l'Intention-Action Gap.">
  <link rel="stylesheet" href="assets/css/palette.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <div data-include="header"></div>

  <main class="container" style="max-width: 800px; padding: 3rem 0;">
    <h1>Task Decomposer</h1>
    <p class="hero-sub">Trasforma un compito complesso in una sequenza di micro-passi. Basato sul modello EAM (Executive Architecture Method).</p>

    <div style="background: var(--white); padding: 2rem; border-radius: 16px; margin: 2rem 0;">
      <label for="task-input" style="font-weight:600; color:var(--primary);">Incolla o scrivi il tuo compito:</label>
      <textarea id="task-input" rows="3" style="width:100%; margin:1rem 0; padding:1rem; border-radius:8px; border:1px solid var(--light-gray); font-family:inherit;" placeholder="Es. Scrivere la tesi, Organizzare il garage, Preparare il budget...">Scrivere la tesi</textarea>

      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom:1rem;">
        <span class="example-chip" onclick="document.getElementById('task-input').value = 'Scrivere relazione trimestrale'">📄 Relazione</span>
        <span class="example-chip" onclick="document.getElementById('task-input').value = 'Organizzare il garage'">🔧 Garage</span>
        <span class="example-chip" onclick="document.getElementById('task-input').value = 'Preparare presentazione'">📊 Presentazione</span>
        <span class="example-chip" onclick="document.getElementById('task-input').value = 'Studiare per esame'">📚 Esame</span>
      </div>

      <button id="decompose-btn" style="background:var(--accent); color:var(--primary); border:none; padding:1rem 2rem; border-radius:40px; font-weight:600; cursor:pointer;">🔨 Scomponi</button>
    </div>

    <div id="steps-container" style="display:none; margin:2rem 0;">
      <h2>Micro‑passi suggeriti</h2>
      <div id="steps-list" style="display:flex; flex-direction:column; gap:0.8rem;"></div>
      <div id="encouragement" style="margin-top:2rem; padding:1.5rem; background:var(--light-gray); border-left:4px solid var(--accent); border-radius:0 8px 8px 0;"></div>
    </div>
  </main>

  <div data-include="footer"></div>
  <script src="assets/js/includes.js" defer></script>
  <script>
    const examples = [
      'Scrivere la tesi', 'Organizzare il garage', 'Preparare una presentazione', 'Studiare per un esame'
    ];
    const encouragements = [
      "Hai fatto il primo passo. Il resto segue.",
      "Iniziare è la parte più difficile. Ora è in discesa.",
      "Ogni grande progetto è solo una serie di piccoli passi.",
      "Non serve fare tutto oggi. Basta il prossimo passo."
    ];

    function decomposeTask(task) {
      const lower = task.toLowerCase();
      if (lower.includes('tesi') || lower.includes('scrivere') || lower.includes('relazione')) {
        return [
          'Apri il documento e salvalo con nome',
          'Scrivi 3 frasi su cosa vuoi dire nel primo paragrafo',
          'Crea un elenco puntato di 5 punti principali',
          'Trova 3 articoli/libri da citare e salva i link',
          'Scrivi per 10 minuti senza fermarti'
        ];
      }
      if (lower.includes('garage') || lower.includes('cantina')) {
        return [
          'Prendi 3 sacchi e mettili all’ingresso',
          'Butta via tutto ciò che è chiaramente spazzatura',
          'Prendi una scatola per "cose da donare"',
          'Scegli una mensola e metti in ordine SOLO quella',
          'Fai una pausa, poi ripeti'
        ];
      }
      if (lower.includes('presentazione') || lower.includes('slide')) {
        return [
          'Crea una presentazione vuota',
          'Aggiungi una slide titolo',
          'Scrivi 3 obiettivi',
          'Cerca 3 immagini pertinenti',
          'Butta giù 5 punti chiave'
        ];
      }
      if (lower.includes('studio') || lower.includes('esame')) {
        return [
          'Prepara tutto il materiale sul tavolo',
          'Apri il libro all’indice e leggi i titoli dei capitoli',
          'Scegli un capitolo e leggi solo il primo paragrafo',
          'Scrivi 3 parole chiave',
          'Imposta un timer di 15 minuti e riassumi'
        ];
      }
      // Fallback generico
      return [
        'Scrivi il compito su un foglio visibile',
        'Identifica la PRIMA azione fisica necessaria',
        'Imposta un timer di 5 minuti e fai SOLO quella azione',
        'Dopo 5 minuti, scrivi cosa hai fatto',
        'Decidi se continuare o fare una pausa'
      ];
    }

    document.getElementById('decompose-btn').addEventListener('click', () => {
      const task = document.getElementById('task-input').value.trim();
      if (!task) return alert('Inserisci un compito');
      const steps = decomposeTask(task);
      const container = document.getElementById('steps-container');
      const list = document.getElementById('steps-list');
      list.innerHTML = '';
      steps.forEach((step, i) => {
        const div = document.createElement('div');
        div.style.background = 'var(--white)';
        div.style.padding = '1rem 1.5rem';
        div.style.borderRadius = '12px';
        div.style.border = '1px solid var(--light-gray)';
        div.innerHTML = `<strong>${i+1}.</strong> ${step}`;
        list.appendChild(div);
      });
      document.getElementById('encouragement').innerHTML = `<p>💬 ${encouragements[Math.floor(Math.random()*encouragements.length)]}</p>`;
      container.style.display = 'block';
      // Salva in localStorage
      const history = JSON.parse(localStorage.getItem('decomposer_history') || '[]');
      history.push({ task, date: new Date().toISOString(), steps });
      localStorage.setItem('decomposer_history', JSON.stringify(history.slice(-10)));
    });
  </script>
  <style>
    .example-chip { background: var(--light-gray); padding:0.3rem 1rem; border-radius:20px; cursor:pointer; transition:0.2s; }
    .example-chip:hover { background:var(--accent); color:var(--primary); }
  </style>
</body>
</html>
